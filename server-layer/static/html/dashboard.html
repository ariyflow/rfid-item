<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - RFID Item Management</title>

    <link rel="stylesheet" href="/static/css/device-management.css">
    <link rel="stylesheet" href="/static/css/data-analysis.css">
    <link rel="stylesheet" href="/static/css/auth.css">
    <script src="/static/js/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { display: flex; min-height: 100vh; font-family: sans-serif; }

        .sidebar {
            width: 200px;
            background: #2c3e50;
            color: #fff;
            padding: 20px 0;
        }

        .sidebar h2 { padding: 0 20px 20px; border-bottom: 1px solid #34495e; }

        .sidebar-menu li {
            padding: 12px 20px;
            cursor: pointer;
        }

        .sidebar-menu li:hover { background: #34495e; }
        .sidebar-menu li.active { background: #3498db; }

        .main-content { flex: 1; padding: 20px; background: #f5f5f5; }

        .content-section { display: none; }
        .content-section.active { display: block; }
    </style>
</head>
<body>
    <aside class="sidebar">
        <h2>菜单</h2>
        <ul class="sidebar-menu">
            <li class="active" data-target="delete-section">设备管理</li>
            <li data-target="settings-section">数据分析</li>
            <li data-target="about-section">关于</li>
        </ul>
        <div style="padding: 20px; border-top: 1px solid #34495e; margin-top: auto;">
            <span id="current-user" style="font-size: 12px; color: #bdc3c7;"></span>
            <button id="logout-btn" style="display: none; width: 100%; margin-top: 8px; padding: 8px; background: #e74c3c; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 12px;">退出登录</button>
        </div>
    </aside>

    <main class="main-content">
        <section id="delete-section" class="content-section active">
            <div class="device-management-container">
                <div class="device-list-container">
                    
                </div>
            </div>
        </section>

        <section id="settings-section" class="content-section">
            <div class="data-analysis-container">
                <div class="analysis-tabs">
                    <button class="analysis-tab active" data-tab="single-device">单设备分析</button>
                    <button class="analysis-tab" data-tab="all-devices">全局分析</button>
                </div>

                <div id="single-device-view" class="analysis-view active">
                    <div class="analysis-controls">
                        <label>
                            选择设备:
                            <select id="device-selector">
                                <option value="">-- 选择设备 --</option>
                            </select>
                        </label>
                        <label>
                            时间范围:
                            <select id="time-range-selector">
                                <option value="24">最近24小时</option>
                                <option value="168">最近7天</option>
                                <option value="720">最近30天</option>
                            </select>
                        </label>
                    </div>
                    <div class="charts-grid">
                        <div class="chart-wrapper">
                            <h3>温度曲线</h3>
                            <canvas id="temperature-chart-single"></canvas>
                        </div>
                        <div class="chart-wrapper">
                            <h3>光强曲线</h3>
                            <canvas id="light-chart-single"></canvas>
                        </div>
                    </div>
                </div>

                <div id="all-devices-view" class="analysis-view">
                    <div class="analysis-controls">
                        <label>
                            时间范围:
                            <select id="global-time-range-selector">
                                <option value="24">最近24小时</option>
                                <option value="168">最近7天</option>
                                <option value="720">最近30天</option>
                            </select>
                        </label>
                        <label>
                            最大记录数:
                            <input type="number" id="global-record-limit" value="500" min="100" max="5000">
                        </label>
                    </div>
                    <div class="charts-grid">
                        <div class="chart-wrapper">
                            <h3>温度曲线 (所有设备)</h3>
                            <canvas id="temperature-chart-global"></canvas>
                        </div>
                        <div class="chart-wrapper">
                            <h3>光强曲线 (所有设备)</h3>
                            <canvas id="light-chart-global"></canvas>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section id="about-section" class="content-section">
            <p>关于内容...</p>
        </section>
    </main>

    <!-- Login Modal -->
    <div id="login-modal" class="login-modal">
        <div class="login-modal-content">
            <h2>登录</h2>
            <p id="login-error" style="color: red; display: none; margin-bottom: 10px;"></p>
            <form id="login-form">
                <input type="text" id="login-username" placeholder="用户名" required>
                <input type="password" id="login-password" placeholder="密码" required>
                <button type="submit">登录</button>
            </form>
        </div>
    </div>

    <script src="/static/js/auth.js"></script>
    <script>
        // 侧边栏切换
        document.querySelectorAll('.sidebar-menu li').forEach(item => {
            item.addEventListener('click', function() {
                // 移除所有 active
                document.querySelectorAll('.sidebar-menu li').forEach(li => li.classList.remove('active'));
                document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));

                // 添加当前 active
                this.classList.add('active');
                document.getElementById(this.dataset.target).classList.add('active');
            });
        });

        // Auth initialization
        (async function initAuth() {
            const modal = document.getElementById('login-modal');
            const logoutBtn = document.getElementById('logout-btn');
            const currentUser = document.getElementById('current-user');
            const loginForm = document.getElementById('login-form');
            const loginError = document.getElementById('login-error');

            const { authenticated, username } = await checkAuth();

            if (authenticated) {
                modal.style.display = 'none';
                logoutBtn.style.display = 'block';
                currentUser.textContent = username || '';
                // Only initialize dashboard features after confirmed auth
                window.initDeviceManagement();
                window.initDataAnalysis();
            } else {
                modal.style.display = 'flex';
                logoutBtn.style.display = 'none';
            }

            // Handle login form submission
            loginForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const u = document.getElementById('login-username').value.trim();
                const p = document.getElementById('login-password').value;
                loginError.style.display = 'none';

                try {
                    await login(u, p);
                    modal.style.display = 'none';
                    logoutBtn.style.display = 'block';
                    currentUser.textContent = u;
                    // Initialize dashboard features after successful login
                    window.initDeviceManagement();
                    window.initDataAnalysis();
                } catch (err) {
                    loginError.textContent = err.message;
                    loginError.style.display = 'block';
                }
            });

            // Handle logout
            logoutBtn.addEventListener('click', async () => {
                await logout();
                window.location.reload();
            });
        })();
    </script>
    <script src="/static/js/device-management.js"></script>
    <script src="/static/js/data-analysis.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div class="main-container">
        <div class="workspace">
            <label>删除某条数据：</label>
            <input type="number" id="numInput" placeholder="输入整数">
            <button id="outputBtn">删除</button>

            <div id="output"></div>
        </div>
    </div>

    <script>

        async function remove_sensor_data_by_id(_id) {
            try {
                const response = await fetch('/api/remove_sensor_data', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id: _id })
                });
                const data = await response.json();
                
                const output = document.getElementById('output');
                if (data.rcv_status === 'success') {
                    output.textContent = `删除成功，ID: ${_id}`;
                } else {
                    output.textContent = `删除失败: ${data.rcv_status}`;
                }
            } catch (error) {
                document.getElementById('output').textContent = '请求出错: ' + error;
            }
        }

        document.getElementById('outputBtn').addEventListener('click', function() {
            const value = parseInt(document.getElementById('numInput').value);
            remove_sensor_data_by_id(value);
        });
    </script>
</body>
</html>

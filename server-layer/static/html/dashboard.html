<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - RFID Item Management</title>

    <link rel="stylesheet" href="/static/css/device-management.css">
    <link rel="stylesheet" href="/static/css/data-analysis.css">
    <link rel="stylesheet" href="/static/css/auth.css">
    <script src="/static/js/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { display: flex; min-height: 100vh; font-family: sans-serif; }

        .sidebar {
            width: 200px;
            background: #2c3e50;
            color: #fff;
            padding: 20px 0;
        }

        .sidebar h2 { padding: 0 20px 20px; border-bottom: 1px solid #34495e; }

        .sidebar-menu li {
            padding: 12px 20px;
            cursor: pointer;
        }

        .sidebar-menu li:hover { background: #34495e; }
        .sidebar-menu li.active { background: #3498db; }

        .main-content { flex: 1; padding: 20px; background: #f5f5f5; }

        .content-section { display: none; }
        .content-section.active { display: block; }
    </style>
</head>
<body>
    <aside class="sidebar">
        <h2>菜单</h2>
        <ul class="sidebar-menu">
            <li class="active" data-target="delete-section">设备管理</li>
            <li data-target="settings-section">数据分析</li>
            <li data-target="about-section">关于</li>
        </ul>
        <div style="padding: 20px; border-top: 1px solid #34495e; margin-top: auto;">
            <span id="current-user" style="font-size: 12px; color: #bdc3c7;"></span>
            <button id="logout-btn" style="display: none; width: 100%; margin-top: 8px; padding: 8px; background: #e74c3c; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 12px;">退出登录</button>
        </div>
    </aside>

    <main class="main-content">
        <section id="delete-section" class="content-section active">
            <div class="device-management-container">
                <div class="device-list-container">
                    
                </div>
            </div>
        </section>

        <section id="settings-section" class="content-section">
            <div class="data-analysis-container">
                <div class="analysis-tabs">
                    <button class="analysis-tab active" data-tab="single-device">单设备分析</button>
                    <button class="analysis-tab" data-tab="all-devices">全局分析</button>
                </div>

                <div id="single-device-view" class="analysis-view active">
                    <div class="analysis-controls">
                        <label>
                            选择设备:
                            <select id="device-selector">
                                <option value="">-- 选择设备 --</option>
                            </select>
                        </label>
                        <label>
                            时间范围:
                            <select id="time-range-selector">
                                <option value="24">最近24小时</option>
                                <option value="168">最近7天</option>
                                <option value="720">最近30天</option>
                            </select>
                        </label>
                    </div>
                    <div class="charts-grid">
                        <div class="chart-wrapper">
                            <h3>温度曲线</h3>
                            <canvas id="temperature-chart-single"></canvas>
                        </div>
                        <div class="chart-wrapper">
                            <h3>光强曲线</h3>
                            <canvas id="light-chart-single"></canvas>
                        </div>
                    </div>
                </div>

                <div id="all-devices-view" class="analysis-view">
                    <div class="analysis-controls">
                        <label>
                            时间范围:
                            <select id="global-time-range-selector">
                                <option value="24">最近24小时</option>
                                <option value="168">最近7天</option>
                                <option value="720">最近30天</option>
                            </select>
                        </label>
                        <label>
                            最大记录数:
                            <input type="number" id="global-record-limit" value="500" min="100" max="5000">
                        </label>
                    </div>
                    <div class="charts-grid">
                        <div class="chart-wrapper">
                            <h3>温度曲线 (所有设备)</h3>
                            <canvas id="temperature-chart-global"></canvas>
                        </div>
                        <div class="chart-wrapper">
                            <h3>光强曲线 (所有设备)</h3>
                            <canvas id="light-chart-global"></canvas>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section id="about-section" class="content-section">
            <p>关于内容...</p>
        </section>
    </main>

    <script>
        // 侧边栏切换
        document.querySelectorAll('.sidebar-menu li').forEach(item => {
            item.addEventListener('click', function() {
                // 移除所有 active
                document.querySelectorAll('.sidebar-menu li').forEach(li => li.classList.remove('active'));
                document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));

                // 添加当前 active
                this.classList.add('active');
                document.getElementById(this.dataset.target).classList.add('active');
            });
        });

        // 初始化 - 由于服务器端已做身份验证，这里直接初始化
        (async function init() {
            const logoutBtn = document.getElementById('logout-btn');
            const currentUser = document.getElementById('current-user');

            // 获取当前用户信息
            let isRoot = false;
            try {
                const resp = await fetch('/dashboard/check', { credentials: 'include' });
                if (resp.ok) {
                    const data = await resp.json();
                    currentUser.textContent = data.username || '';
                    logoutBtn.style.display = 'block';
                    isRoot = data.is_root || false;
                }
            } catch (_) {}

            // 初始化仪表盘功能
            window.initDeviceManagement();
            window.initDataAnalysis();

            // root 用户才加载用户管理模块
            if (isRoot) {
                await loadUserManagement();
            }

            // 处理退出登录
            logoutBtn.addEventListener('click', async () => {
                await fetch('/admin/logout', { method: 'POST', credentials: 'include' });
                window.location.href = '/admin';
            });
        })();

        // 动态加载用户管理模块（仅 root 用户）
        async function loadUserManagement() {
            // 加载 CSS
            const cssLink = document.createElement('link');
            cssLink.rel = 'stylesheet';
            cssLink.href = '/static/css/user-management.css';
            document.head.appendChild(cssLink);

            // 注入 HTML 结构和菜单项
            const menuItem = document.createElement('li');
            menuItem.id = 'user-management-menu';
            menuItem.dataset.target = 'user-management-section';
            menuItem.textContent = '用户管理';
            document.querySelector('.sidebar-menu').appendChild(menuItem);

            const section = document.createElement('section');
            section.id = 'user-management-section';
            section.className = 'content-section';
            section.innerHTML = `
                <div class="user-management-container">
                    <div class="user-list-header">
                        <h2>用户管理</h2>
                        <button class="add-user-btn" id="add-user-btn">添加用户</button>
                    </div>
                    <form class="add-user-form" id="add-user-form">
                        <h3>添加新用户</h3>
                        <input type="text" id="new-username-input" class="add-user-input" placeholder="用户名">
                        <input type="password" id="new-password-input" class="add-user-input" placeholder="密码">
                        <button type="button" class="add-user-submit-btn" id="add-user-submit-btn">提交</button>
                        <button type="button" class="cancel-add-user-btn" id="cancel-add-user-btn">取消</button>
                    </form>
                    <table class="user-table" id="user-list-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>用户名</th>
                                <th>创建时间</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            `;
            document.querySelector('.main-content').appendChild(section);

            // 加载并执行 JS
            await new Promise((resolve, reject) => {
                const script = document.createElement('script');
                script.src = '/static/js/user-management.js';
                script.onload = resolve;
                script.onerror = reject;
                document.body.appendChild(script);
            });

            // 调用初始化函数
            if (window.initUserManagement) {
                window.initUserManagement();
            }
        }
    </script>
    <script src="/static/js/device-management.js"></script>
    <script src="/static/js/data-analysis.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - RFID 物品管理系统</title>
    <link rel="stylesheet" href="/static/css/auth.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #a8aab3 0%, #fffeff 100%);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        .login-container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            width: 360px;
            max-width: 90%;
        }

        .login-container h1 {
            margin: 0 0 8px 0;
            color: #2c3e50;
            text-align: center;
            font-size: 24px;
        }

        .login-container .subtitle {
            color: #7f8c8d;
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .login-container input {
            width: 100%;
            padding: 12px 15px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .login-container input:focus {
            outline: none;
            border-color: #667eea;
        }

        .login-container button {
            width: 100%;
            padding: 12px;
            background: #2196F3;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 500;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .login-container button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .login-container button:active {
            transform: translateY(0);
        }

        .error-message {
            color: #e74c3c;
            background: #fdf2f2;
            border: 1px solid #f5c6cb;
            border-radius: 6px;
            padding: 10px;
            margin-bottom: 15px;
            font-size: 13px;
            text-align: center;
            display: none;
        }

        .loading {
            opacity: 0.7;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>RFID 物品管理系统</h1>
        <p class="subtitle">请登录以继续</p>

        <div id="error" class="error-message"></div>

        <form id="login-form">
            <input type="text" id="username" placeholder="用户名" required autocomplete="username">
            <input type="password" id="password" placeholder="密码" required autocomplete="current-password">
            <button type="submit" id="submit-btn">登录</button>
        </form>
    </div>

    <script>
        const form = document.getElementById('login-form');
        const errorDiv = document.getElementById('error');
        const submitBtn = document.getElementById('submit-btn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorDiv.style.display = 'none';
            submitBtn.classList.add('loading');
            submitBtn.textContent = '登录中...';

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            try {
                const resp = await fetch('/admin/login', {
                    method: 'POST',
                    credentials: 'include',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password }),
                });

                const data = await resp.json().catch(() => ({}));

                if (resp.ok && data.status === 'success') {
                    window.location.href = data.redirect || '/dashboard';
                } else {
                    errorDiv.textContent = data.message || '登录失败，请检查用户名和密码';
                    errorDiv.style.display = 'block';
                    submitBtn.classList.remove('loading');
                    submitBtn.textContent = '登录';
                }
            } catch (err) {
                errorDiv.textContent = '网络错误，请稍后重试';
                errorDiv.style.display = 'block';
                submitBtn.classList.remove('loading');
                submitBtn.textContent = '登录';
            }
        });
    </script>
</body>
</html>

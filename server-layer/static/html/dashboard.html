<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { display: flex; min-height: 100vh; font-family: sans-serif; }
        
        .sidebar {
            width: 200px;
            background: #2c3e50;
            color: #fff;
            padding: 20px 0;
        }
        
        .sidebar h2 { padding: 0 20px 20px; border-bottom: 1px solid #34495e; }
        
        .sidebar-menu li {
            padding: 12px 20px;
            cursor: pointer;
        }
        
        .sidebar-menu li:hover { background: #34495e; }
        .sidebar-menu li.active { background: #3498db; }
        
        .main-content { flex: 1; padding: 20px; background: #f5f5f5; }
        
        .content-section { display: none; }
        .content-section.active { display: block; }
    </style>
</head>
<body>
    <!-- 侧边栏 -->
    <aside class="sidebar">
        <h2>菜单</h2>
        <ul class="sidebar-menu">
            <li class="active" data-target="delete-section">删除数据</li>
            <li data-target="settings-section">设置</li>
            <li data-target="about-section">关于</li>
        </ul>
    </aside>
    <!-- 主内容区 -->
    <main class="main-content">
        <!-- 删除数据区域 -->
        <section id="delete-section" class="content-section active">
            <!-- 原有的删除功能内容 -->
        </section>
        <!-- 其他区域（预留） -->
        <section id="settings-section" class="content-section">
            <p>设置功能开发中...</p>
        </section>
        
        <section id="about-section" class="content-section">
            <p>关于内容...</p>
        </section>
    </main>

    <script>
        // 侧边栏切换
        document.querySelectorAll('.sidebar-menu li').forEach(item => {
            item.addEventListener('click', function() {
                // 移除所有 active
                document.querySelectorAll('.sidebar-menu li').forEach(li => li.classList.remove('active'));
                document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
                
                // 添加当前 active
                this.classList.add('active');
                document.getElementById(this.dataset.target).classList.add('active');
            });
        });
        // 原有删除功能保留不变...
    </script>
</body>
</html>
